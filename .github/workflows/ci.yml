name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test
        env:
          SPRING_PROFILES_ACTIVE: test
          SERVER_PORT: 9000
          DATABASE_URL: jdbc:postgresql://localhost:5432/ecommerce_test
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test
          DATABASE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET_KEY: eW91clNlY3JldEtleUZvckpTb25BbmRUaGlzSXNBbm90aGVyVGVzdEtleUZvckpXVAo=
          ACCESS_TOKEN_EXPIRATION: 900000
          REFRESH_TOKEN_EXPIRATION: 2592000000
          FRONTEND_URL: http://localhost:5173
          STRIPE_API_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          CLOUDINARY_URL: cloudinary://key:secret@cloud
          CLIENT_ID: placeholder
          CLIENT_SECRET: placeholder
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USERNAME: ci
          MAIL_PASSWORD: ci
          ADMIN_EMAIL: admin@ecommerce.dev
          ADMIN_PASSWORD: Admin@123
